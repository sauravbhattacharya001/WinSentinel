# Dependabot configuration for WinSentinel
# Keeps NuGet packages, GitHub Actions, and Docker base images up to date.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# Design notes:
# - NuGet updates are grouped by family (Microsoft.Extensions.*, System.*, test stack)
#   so a single PR covers a coherent bump set instead of 8 noisy ones.
# - GitHub Actions and Docker minor+patch bumps are auto-grouped into a single PR
#   to cut review fatigue; majors stay as their own PR because they usually break.
# - The Dockerfile base tag is pinned to net8.0 Windows Server Core LTSC2022.
#   Major-version bumps (8 -> 9 / 10) require a coordinated migration of the
#   TFM in every .csproj plus base-image retest, so we explicitly ignore them
#   here to keep the gardener / dependabot loop from re-opening them every week.

version: 2
updates:
  # .NET NuGet dependencies
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "sauravbhattacharya001"
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      prefix: "deps(nuget)"
      include: "scope"
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      microsoft-data:
        patterns:
          - "Microsoft.Data.*"
      system-packages:
        patterns:
          - "System.*"
      testing:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.*"
          - "coverlet.*"
          - "FluentAssertions*"
          - "Moq*"
      analyzers:
        patterns:
          - "*Analyzers"
          - "StyleCop.*"
          - "Roslynator.*"
          - "SonarAnalyzer.*"
      nuget-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "sauravbhattacharya001"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps(actions)"
      include: "scope"
    groups:
      actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    reviewers:
      - "sauravbhattacharya001"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps(docker)"
      include: "scope"
    # Pin to .NET 8 LTS Windows Server Core; major bumps require a coordinated
    # TFM + base-image migration and are tracked manually, not by dependabot.
    ignore:
      - dependency-name: "mcr.microsoft.com/dotnet/sdk"
        update-types: ["version-update:semver-major"]
      - dependency-name: "mcr.microsoft.com/dotnet/runtime"
        update-types: ["version-update:semver-major"]
      - dependency-name: "mcr.microsoft.com/dotnet/aspnet"
        update-types: ["version-update:semver-major"]
    groups:
      docker-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
