# Auto-labeler configuration for WinSentinel
# Labels PRs based on the files they change.
#
# Conventions:
#   * Each top-level key is a GitHub label that must exist in the repo.
#     New labels added here must also be created via `gh label create`
#     (see CONTRIBUTING.md → "Labels Glossary").
#   * Globs use the `actions/labeler@v6` format with `changed-files`.
#   * Multiple globs under one label are OR'd (any-glob-to-any-file).
#   * Keep narrowest globs first within a label for clarity.

# --- Core Library ---
core:
  - changed-files:
      - any-glob-to-any-file: 'src/WinSentinel.Core/**/*'

# --- Core: Security audit modules ---
audits:
  - changed-files:
      - any-glob-to-any-file: 'src/WinSentinel.Core/Audits/**/*'

# --- Core: Services (scoring, compliance, reporting, etc.) ---
services:
  - changed-files:
      - any-glob-to-any-file: 'src/WinSentinel.Core/Services/**/*'

# --- Core: Helpers (input sanitization, registry, WMI, shell) ---
helpers:
  - changed-files:
      - any-glob-to-any-file: 'src/WinSentinel.Core/Helpers/**/*'

# --- Core: Data models ---
models:
  - changed-files:
      - any-glob-to-any-file: 'src/WinSentinel.Core/Models/**/*'

# --- Core: Persistence layer (SQLite history, encryption) ---
data:
  - changed-files:
      - any-glob-to-any-file: 'src/WinSentinel.Core/Data/**/*'

# --- Agent (real-time monitoring) ---
agent:
  - changed-files:
      - any-glob-to-any-file: 'src/WinSentinel.Agent/**/*'

# --- CLI ---
cli:
  - changed-files:
      - any-glob-to-any-file: 'src/WinSentinel.Cli/**/*'

# --- Desktop App (WPF) ---
app:
  - changed-files:
      - any-glob-to-any-file: 'src/WinSentinel.App/**/*'

# --- Windows Service host ---
service:
  - changed-files:
      - any-glob-to-any-file: 'src/WinSentinel.Service/**/*'

# --- Installer / Packaging (MSIX project only) ---
installer:
  - changed-files:
      - any-glob-to-any-file: 'src/WinSentinel.Installer/**/*'

# --- Standalone PowerShell scripts at repo root ---
# (Install/Fix/RunAudit helpers — distinct from the MSIX installer project)
scripts:
  - changed-files:
      - any-glob-to-any-file:
          - '*.ps1'
          - 'scripts/**/*'

# --- Tests ---
tests:
  - changed-files:
      - any-glob-to-any-file: 'tests/**/*'

# --- CI/CD & DevOps ---
ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**/*'
          - '.github/labeler.yml'
          - '.github/stale.yml'

# --- Docker ---
docker:
  - changed-files:
      - any-glob-to-any-file:
          - 'Dockerfile'
          - '.dockerignore'
          - 'docker-compose.yml'
          - '.github/workflows/docker*.yml'

# --- Documentation (README, SECURITY, LICENSE, docs site, copilot guidance) ---
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**/*'
          - 'docfx/**/*'
          - 'README.md'
          - 'SECURITY.md'
          - 'LICENSE'
          - 'CODE_OF_CONDUCT.md'
          - 'CONTRIBUTING.md'
          - '.github/copilot-instructions.md'

# --- Dependency updates (Dependabot, manual bumps, lockfiles, props) ---
dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/dependabot.yml'
          - '**/*.csproj'
          - '**/packages.lock.json'
          - 'Directory.Build.props'
          - 'Directory.Packages.props'
          - 'global.json'

# --- IPC (inter-process communication between Agent and clients) ---
ipc:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/WinSentinel.Agent/Ipc/**/*'
          - 'src/WinSentinel.Core/Services/IpcClient.cs'

# --- Threat Detection (agent monitors and correlators) ---
threat-detection:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/WinSentinel.Agent/Modules/**/*'
          - 'src/WinSentinel.Agent/Services/ThreatCorrelator.cs'
          - 'src/WinSentinel.Agent/Services/AgentBrain.cs'
          - 'src/WinSentinel.Agent/ThreatEvent.cs'
          - 'src/WinSentinel.Agent/ThreatLog.cs'

# --- Remediation (auto-fix strategies and planners) ---
remediation:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/WinSentinel.Agent/Services/AutoRemediator.cs'
          - 'src/WinSentinel.Agent/Services/ResponsePolicy.cs'
          - 'src/WinSentinel.Agent/Services/RemediationStrategies.cs'
          - 'src/WinSentinel.Core/Services/FixEngine.cs'
          - 'src/WinSentinel.Core/Services/RemediationPlanner.cs'
          - 'src/WinSentinel.Core/Models/RemediationModels.cs'
          - 'src/WinSentinel.Core/Models/FixResult.cs'

# --- UI / XAML (WPF views, view-models, controls) ---
ui:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/WinSentinel.App/Views/**/*'
          - 'src/WinSentinel.App/ViewModels/**/*'
          - 'src/WinSentinel.App/Controls/**/*'
          - '**/*.xaml'
          - '**/*.xaml.cs'

# --- Solution / project / build configuration ---
build:
  - changed-files:
      - any-glob-to-any-file:
          - '*.sln'
          - '**/*.csproj'
          - 'Directory.Build.props'
          - 'Directory.Packages.props'
          - 'global.json'
