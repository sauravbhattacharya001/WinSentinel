name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  CONFIGURATION: Release
  PLATFORM: x64

jobs:
  # ─────────────────────────────────────────────
  # Dependency review (PRs only)
  # ─────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/checkout@v6
    - uses: actions/dependency-review-action@v5
      with:
        fail-on-severity: high
        comment-summary-in-pr: always

  # ─────────────────────────────────────────────
  # Code quality: format & style checks
  # ─────────────────────────────────────────────
  lint:
    name: Code Style & Format
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore

    - name: Check formatting
      run: dotnet format --verify-no-changes --verbosity diagnostic
      continue-on-error: true

    - name: Check style violations
      run: dotnet format style --verify-no-changes --verbosity diagnostic
      continue-on-error: true

    - name: Check analyzer warnings
      run: dotnet format analyzers --verify-no-changes --severity warn --verbosity diagnostic
      continue-on-error: true

  # ─────────────────────────────────────────────
  # Build & Test with coverage
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test (${{ matrix.configuration }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        configuration: [ Debug, Release ]

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
        restore-keys: nuget-${{ runner.os }}-

    - name: Restore dependencies
      run: dotnet restore

    - name: Enforce no-pro-code guard
      shell: pwsh
      run: ./scripts/check-no-pro-code.ps1

    - name: Build
      run: >-
        dotnet build --no-restore
        --configuration ${{ matrix.configuration }}
        -p:Platform=x64
        -p:TreatWarningsAsErrors=true
        -p:EnforceCodeStyleInBuild=true

    - name: Test with coverage
      run: >-
        dotnet test --no-build
        --configuration ${{ matrix.configuration }}
        -p:Platform=x64
        --verbosity normal
        --logger "trx;LogFileName=test-results.trx"
        --collect:"XPlat Code Coverage"
        --settings tests/WinSentinel.Tests/coverlet.runsettings
        --results-directory TestResults
      continue-on-error: true

    - name: Upload test results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: test-results-${{ matrix.configuration }}
        path: '**/TestResults/**/*.trx'
        retention-days: 14

    - name: Upload coverage
      uses: actions/upload-artifact@v7
      if: always() && matrix.configuration == 'Release'
      with:
        name: coverage-report
        path: '**/TestResults/**/coverage.cobertura.xml'
        retention-days: 14

    - name: Upload to Codecov
      if: matrix.configuration == 'Release'
      uses: codecov/codecov-action@v6
      with:
        files: '**/TestResults/**/coverage.cobertura.xml'
        flags: unittests
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Install ReportGenerator
      if: matrix.configuration == 'Release'
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Generate HTML coverage report
      if: matrix.configuration == 'Release'
      shell: pwsh
      run: |
        $coverageFiles = Get-ChildItem -Recurse -Filter "coverage.cobertura.xml" -Path TestResults
        if ($coverageFiles.Count -gt 0) {
          $files = ($coverageFiles | ForEach-Object { $_.FullName }) -join ";"
          reportgenerator `
            -reports:"$files" `
            -targetdir:"CoverageReport" `
            -reporttypes:"HtmlInline_AzurePipelines;Badges;TextSummary" `
            -assemblyfilters:"-WinSentinel.Tests;-WinSentinel.Installer"
        }

    - name: Upload HTML coverage report
      uses: actions/upload-artifact@v7
      if: always() && matrix.configuration == 'Release'
      with:
        name: coverage-html-report
        path: CoverageReport/
        retention-days: 30

    - name: Generate coverage report summary
      if: matrix.configuration == 'Release'
      shell: pwsh
      run: |
        $coverageFiles = Get-ChildItem -Recurse -Filter "coverage.cobertura.xml" -Path TestResults
        if ($coverageFiles.Count -gt 0) {
          $xml = [xml](Get-Content $coverageFiles[0].FullName)
          $lineRate = [math]::Round([double]$xml.coverage.'line-rate' * 100, 1)
          $branchRate = [math]::Round([double]$xml.coverage.'branch-rate' * 100, 1)
          $linesValid = $xml.coverage.'lines-valid'
          $linesCovered = $xml.coverage.'lines-covered'

          Write-Output "## 📊 Code Coverage Summary" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "| Metric | Value |" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "|--------|-------|" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "| Line Coverage | **$lineRate%** |" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "| Branch Coverage | **$branchRate%** |" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "| Lines Covered | $linesCovered / $linesValid |" >> $env:GITHUB_STEP_SUMMARY
        }

  # ─────────────────────────────────────────────
  # Security: check for vulnerable packages
  # ─────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore

    - name: Check for vulnerable NuGet packages
      run: dotnet list package --vulnerable --include-transitive
      continue-on-error: true

    - name: Check for deprecated packages
      run: dotnet list package --deprecated
      continue-on-error: true

  # ─────────────────────────────────────────────
  # Publish artifacts & preview NuGet packages
  # ─────────────────────────────────────────────
  publish:
    name: Publish Artifacts
    runs-on: windows-latest
    needs: [ build-and-test, lint ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0   # MinVer needs full history for preview versions

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore

    - name: Publish CLI
      run: >-
        dotnet publish src/WinSentinel.Cli/WinSentinel.Cli.csproj
        --configuration Release
        -p:Platform=x64
        --output ./artifacts/cli

    - name: Publish Agent
      run: >-
        dotnet publish src/WinSentinel.Agent/WinSentinel.Agent.csproj
        --configuration Release
        -p:Platform=x64
        --output ./artifacts/agent

    - name: Upload CLI artifact
      uses: actions/upload-artifact@v7
      with:
        name: winsentinel-cli
        path: ./artifacts/cli/
        retention-days: 30

    - name: Upload Agent artifact
      uses: actions/upload-artifact@v7
      with:
        name: winsentinel-agent
        path: ./artifacts/agent/
        retention-days: 30

    # ── Preview NuGet packages → GitHub Packages ──
    - name: Pack preview NuGet packages
      shell: pwsh
      run: |
        dotnet pack src/WinSentinel.Core/WinSentinel.Core.csproj `
          -c Release --no-build -o ./nupkg
        dotnet pack src/WinSentinel.Cli/WinSentinel.Cli.csproj `
          -c Release --no-build -o ./nupkg

    - name: Validate NuGet packages
      shell: pwsh
      run: |
        dotnet tool install --global dotnet-validate --version 0.*
        Get-ChildItem ./nupkg -Filter *.nupkg | ForEach-Object {
          Write-Host "Validating $($_.Name)..."
          dotnet-validate package local $_.FullName
        }
      continue-on-error: true

    - name: Push preview packages to GitHub Packages
      shell: pwsh
      run: |
        Get-ChildItem ./nupkg -Filter *.nupkg | ForEach-Object {
          dotnet nuget push $_.FullName `
            --source "https://nuget.pkg.github.com/sauravbhattacharya001/index.json" `
            --api-key ${{ secrets.GITHUB_TOKEN }} `
            --skip-duplicate
        }
        Get-ChildItem ./nupkg -Filter *.snupkg | ForEach-Object {
          dotnet nuget push $_.FullName `
            --source "https://nuget.pkg.github.com/sauravbhattacharya001/index.json" `
            --api-key ${{ secrets.GITHUB_TOKEN }} `
            --skip-duplicate
        }

    - name: Preview package summary
      shell: pwsh
      run: |
        "## 📦 Preview NuGet Packages" >> $env:GITHUB_STEP_SUMMARY
        "" >> $env:GITHUB_STEP_SUMMARY
        "| Package | Size |" >> $env:GITHUB_STEP_SUMMARY
        "|---------|------|" >> $env:GITHUB_STEP_SUMMARY
        Get-ChildItem ./nupkg -Filter *.nupkg | ForEach-Object {
          $sizeKB = [math]::Round($_.Length / 1KB, 1)
          "| ``$($_.Name)`` | ${sizeKB} KB |" >> $env:GITHUB_STEP_SUMMARY
        }
        "" >> $env:GITHUB_STEP_SUMMARY
        "Install preview: ``dotnet nuget add source https://nuget.pkg.github.com/sauravbhattacharya001/index.json``" >> $env:GITHUB_STEP_SUMMARY

    - name: Upload NuGet artifacts
      uses: actions/upload-artifact@v7
      with:
        name: nuget-preview-packages
        path: ./nupkg/*
        retention-days: 14

    - name: Generate SBOM
      run: >
        dotnet tool install --global Microsoft.Sbom.DotNetTool &&
        sbom-tool generate
        -b ./artifacts
        -bc ./src
        -pn WinSentinel
        -pv 1.0.0
        -ps sauravbhattacharya001
        -nsb https://github.com/sauravbhattacharya001/WinSentinel
      continue-on-error: true

    - name: Upload SBOM
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: sbom
        path: ./artifacts/_manifest/
        retention-days: 90
