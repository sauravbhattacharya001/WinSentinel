name: Publish NuGet Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      push_to_nuget:
        description: 'Push to NuGet.org (requires NUGET_API_KEY secret)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: |
        dotnet restore src/WinSentinel.Core/WinSentinel.Core.csproj
        dotnet restore src/WinSentinel.Cli/WinSentinel.Cli.csproj

    - name: Build
      run: |
        dotnet build src/WinSentinel.Core/WinSentinel.Core.csproj --no-restore -c Release
        dotnet build src/WinSentinel.Cli/WinSentinel.Cli.csproj --no-restore -c Release

    - name: Run tests
      run: dotnet test tests/WinSentinel.Tests/WinSentinel.Tests.csproj -c Release --verbosity normal
      continue-on-error: true

    - name: Pack NuGet packages
      run: |
        dotnet pack src/WinSentinel.Core/WinSentinel.Core.csproj `
          --no-build -c Release `
          -o ./nupkg
        dotnet pack src/WinSentinel.Cli/WinSentinel.Cli.csproj `
          --no-build -c Release `
          -o ./nupkg

    - name: List packages
      shell: pwsh
      run: |
        Get-ChildItem ./nupkg -Recurse | ForEach-Object {
          $sizeMB = [math]::Round($_.Length / 1KB, 1)
          Write-Host "$($_.Name) — ${sizeMB} KB"
        }

    - name: Validate NuGet packages
      shell: pwsh
      run: |
        dotnet tool install --global dotnet-validate --version 0.*
        $failed = $false
        Get-ChildItem ./nupkg -Filter *.nupkg | ForEach-Object {
          Write-Host "::group::Validating $($_.Name)"
          dotnet-validate package local $_.FullName
          if ($LASTEXITCODE -ne 0) { $failed = $true }
          Write-Host "::endgroup::"
        }
        if ($failed) {
          Write-Host "::warning::One or more packages failed validation"
        }
      continue-on-error: true

    - name: Upload NuGet artifacts
      uses: actions/upload-artifact@v7
      with:
        name: nuget-packages
        path: ./nupkg/*
        retention-days: 30

    - name: Push to GitHub Packages
      shell: pwsh
      run: |
        Get-ChildItem ./nupkg -Filter *.nupkg | ForEach-Object {
          dotnet nuget push $_.FullName --source "https://nuget.pkg.github.com/sauravbhattacharya001/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
        }
        Get-ChildItem ./nupkg -Filter *.snupkg | ForEach-Object {
          dotnet nuget push $_.FullName --source "https://nuget.pkg.github.com/sauravbhattacharya001/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
        }

    - name: Push to NuGet.org
      if: github.event_name == 'release' || inputs.push_to_nuget == true
      shell: pwsh
      run: |
        Get-ChildItem ./nupkg -Filter *.nupkg | ForEach-Object {
          dotnet nuget push $_.FullName --source "https://api.nuget.org/v3/index.json" --api-key $env:NUGET_API_KEY --skip-duplicate
        }
        Get-ChildItem ./nupkg -Filter *.snupkg | ForEach-Object {
          dotnet nuget push $_.FullName --source "https://api.nuget.org/v3/index.json" --api-key $env:NUGET_API_KEY --skip-duplicate
        }
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    - name: Package summary
      shell: pwsh
      run: |
        # Extract version from the first .nupkg filename
        $pkg = Get-ChildItem ./nupkg -Filter *.nupkg | Select-Object -First 1
        $version = if ($pkg.Name -match '\.(\d+\.\d+\.\d+[^.]*)\.' ) { $Matches[1] } else { 'unknown' }

        "## 📦 NuGet Packages Published" >> $env:GITHUB_STEP_SUMMARY
        "" >> $env:GITHUB_STEP_SUMMARY
        "| Package | Type | Version | Size |" >> $env:GITHUB_STEP_SUMMARY
        "|---------|------|---------|------|" >> $env:GITHUB_STEP_SUMMARY
        Get-ChildItem ./nupkg -Filter *.nupkg | ForEach-Object {
          $sizeKB = [math]::Round($_.Length / 1KB, 1)
          $name = $_.BaseName -replace '\.\d+\.\d+\.\d+.*$', ''
          $type = if ($name -match 'Cli') { '.NET Tool' } else { 'Library' }
          "| ``$name`` | $type | ``$version`` | ${sizeKB} KB |" >> $env:GITHUB_STEP_SUMMARY
        }
        "" >> $env:GITHUB_STEP_SUMMARY
        "### Install Library" >> $env:GITHUB_STEP_SUMMARY
        "``````" >> $env:GITHUB_STEP_SUMMARY
        "dotnet add package WinSentinel.Core --version $version" >> $env:GITHUB_STEP_SUMMARY
        "``````" >> $env:GITHUB_STEP_SUMMARY
        "" >> $env:GITHUB_STEP_SUMMARY
        "### Install CLI Tool" >> $env:GITHUB_STEP_SUMMARY
        "``````" >> $env:GITHUB_STEP_SUMMARY
        "dotnet tool install --global WinSentinel.Cli --version $version" >> $env:GITHUB_STEP_SUMMARY
        "``````" >> $env:GITHUB_STEP_SUMMARY
