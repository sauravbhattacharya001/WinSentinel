# Versioning precedence (highest → lowest):
#   1. Explicit `version_override` workflow_dispatch input
#   2. Release tag (when triggered by a published release; e.g. `v1.15.1` → `1.15.1`)
#   3. MinVer auto-computed from git history (latest `v*` tag + height/SHA)
#
# IMPORTANT: this repo uses MinVer (see Directory.Build.props). MinVer hooks into
# MSBuild's version-resolution targets and OVERWRITES `$(Version)` regardless of
# any `-p:Version=...` passed on the command line. To force a specific version we
# must use `-p:MinVerVersionOverride=<v>` on BOTH `dotnet build` and `dotnet pack`.
# When no override is supplied we pass nothing and let MinVer compute normally.
# See issue #225.
name: Publish NuGet Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      push_to_nuget:
        description: 'Push to NuGet.org (requires NUGET_API_KEY secret)'
        required: false
        type: boolean
        default: true
      version_override:
        description: 'Version override (e.g. 1.15.1). Leave empty to use latest release tag.'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Determine version
      id: version
      shell: pwsh
      run: |
        # `has_override` is true whenever we have an explicit version to force on
        # MinVer (either the workflow_dispatch input or a release tag). When false,
        # we let MinVer derive the version from git tags on its own.
        $hasOverride = $false
        if ('${{ inputs.version_override }}') {
          $ver = '${{ inputs.version_override }}'
          $hasOverride = $true
        } elseif ('${{ github.event.release.tag_name }}') {
          $ver = '${{ github.event.release.tag_name }}' -replace '^v', ''
          $hasOverride = $true
        } else {
          $tag = git describe --tags --abbrev=0 2>$null
          $ver = if ($tag) { $tag -replace '^v', '' } else { '1.0.0' }
          # no override — let MinVer compute the actual built version from git
        }
        Write-Host "Package version (display): $ver"
        Write-Host "Has explicit override: $hasOverride"
        "version=$ver" >> $env:GITHUB_OUTPUT
        "has_override=$($hasOverride.ToString().ToLower())" >> $env:GITHUB_OUTPUT

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: |
        dotnet restore src/WinSentinel.Core/WinSentinel.Core.csproj
        dotnet restore src/WinSentinel.Cli/WinSentinel.Cli.csproj

    - name: Build
      shell: pwsh
      run: |
        # MinVer respects -p:MinVerVersionOverride; -p:Version is silently
        # overwritten by MinVer's target. Only pass override when we have one.
        $extra = @()
        if ('${{ steps.version.outputs.has_override }}' -eq 'true') {
          $extra += "-p:MinVerVersionOverride=${{ steps.version.outputs.version }}"
        }
        dotnet build src/WinSentinel.Core/WinSentinel.Core.csproj --no-restore -c Release @extra
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        dotnet build src/WinSentinel.Cli/WinSentinel.Cli.csproj --no-restore -c Release @extra
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: Pack NuGet packages
      shell: pwsh
      run: |
        # Same rationale as the Build step: must use MinVerVersionOverride for
        # the override to actually win against MinVer's MSBuild target.
        $extra = @()
        if ('${{ steps.version.outputs.has_override }}' -eq 'true') {
          $extra += "-p:MinVerVersionOverride=${{ steps.version.outputs.version }}"
        }
        dotnet pack src/WinSentinel.Core/WinSentinel.Core.csproj --no-build -c Release -o ./nupkg @extra
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        dotnet pack src/WinSentinel.Cli/WinSentinel.Cli.csproj --no-build -c Release -o ./nupkg @extra
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: List packages
      shell: pwsh
      run: |
        Get-ChildItem ./nupkg -Recurse | ForEach-Object {
          $sizeMB = [math]::Round($_.Length / 1KB, 1)
          Write-Host "$($_.Name) - ${sizeMB} KB"
        }

    - name: Validate NuGet packages
      shell: pwsh
      run: |
        dotnet tool install --global dotnet-validate --version 0.*
        $failed = $false
        Get-ChildItem ./nupkg -Filter *.nupkg | ForEach-Object {
          Write-Host "::group::Validating $($_.Name)"
          dotnet-validate package local $_.FullName
          if ($LASTEXITCODE -ne 0) { $failed = $true }
          Write-Host "::endgroup::"
        }
        if ($failed) {
          Write-Host "::warning::One or more packages failed validation"
        }
      continue-on-error: true

    - name: Upload NuGet artifacts
      uses: actions/upload-artifact@v7
      with:
        name: nuget-packages
        path: ./nupkg/*
        retention-days: 30

    - name: Push to GitHub Packages
      shell: pwsh
      run: |
        # `dotnet nuget push *.nupkg` auto-pushes the matching .snupkg.
        # Explicit *.snupkg loop caused 409 Conflict failing the whole workflow.
        #
        # GitHub Packages' NuGet endpoint returns a non-zero exit code on duplicate
        # versions even with --skip-duplicate (unlike NuGet.org). We swallow that
        # specific failure mode ("has already been pushed") but propagate any
        # other error (auth, network, malformed package, etc). See issue #224.
        $genuineFailure = $false
        Get-ChildItem ./nupkg -Filter *.nupkg | ForEach-Object {
          Write-Host "::group::Pushing $($_.Name) to GitHub Packages"
          $output = dotnet nuget push $_.FullName `
            --source "https://nuget.pkg.github.com/sauravbhattacharya001/index.json" `
            --api-key ${{ secrets.GITHUB_TOKEN }} `
            --skip-duplicate 2>&1 | Out-String
          $exit = $LASTEXITCODE
          Write-Host $output
          if ($exit -ne 0) {
            if ($output -match 'has already been pushed') {
              Write-Host "::notice::$($_.Name) already published to GitHub Packages — treating as success."
            } else {
              Write-Host "::error::Push of $($_.Name) to GitHub Packages failed (exit $exit)."
              $genuineFailure = $true
            }
          }
          Write-Host "::endgroup::"
        }
        if ($genuineFailure) { exit 1 }

    - name: Push to NuGet.org
      if: github.event_name == 'release' || inputs.push_to_nuget == true
      shell: pwsh
      run: |
        Get-ChildItem ./nupkg -Filter *.nupkg | ForEach-Object {
          dotnet nuget push $_.FullName --source "https://api.nuget.org/v3/index.json" --api-key $env:NUGET_API_KEY --skip-duplicate
        }
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    - name: Package summary
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.version }}"

        "## 📦 NuGet Packages Published" >> $env:GITHUB_STEP_SUMMARY
        "" >> $env:GITHUB_STEP_SUMMARY
        "| Package | Type | Version | Size |" >> $env:GITHUB_STEP_SUMMARY
        "|---------|------|---------|------|" >> $env:GITHUB_STEP_SUMMARY
        Get-ChildItem ./nupkg -Filter *.nupkg | ForEach-Object {
          $sizeKB = [math]::Round($_.Length / 1KB, 1)
          $name = $_.BaseName -replace '\.\d+\.\d+\.\d+.*$', ''
          $type = if ($name -match 'Cli') { '.NET Tool' } else { 'Library' }
          "| ``$name`` | $type | ``$version`` | ${sizeKB} KB |" >> $env:GITHUB_STEP_SUMMARY
        }
        "" >> $env:GITHUB_STEP_SUMMARY
        "### Install Library" >> $env:GITHUB_STEP_SUMMARY
        "``````bash" >> $env:GITHUB_STEP_SUMMARY
        "dotnet add package WinSentinel.Core --version $version" >> $env:GITHUB_STEP_SUMMARY
        "``````" >> $env:GITHUB_STEP_SUMMARY
        "" >> $env:GITHUB_STEP_SUMMARY
        "### Install CLI Tool" >> $env:GITHUB_STEP_SUMMARY
        "``````bash" >> $env:GITHUB_STEP_SUMMARY
        "dotnet tool install --global WinSentinel.Cli --version $version" >> $env:GITHUB_STEP_SUMMARY
        "``````" >> $env:GITHUB_STEP_SUMMARY
