name: Submit to winget

# Submits a manifest to microsoft/winget-pkgs whenever a GitHub release is
# published. Uses the WinSentinel MSIX asset built by release.yml.
#
# Prereqs (one-time):
#   1. Create a fine-scoped PAT on a GitHub account that has forked
#      microsoft/winget-pkgs. Save it as repo secret WINGET_TOKEN.
#   2. The MSIX in the release must be signed by a publicly-trusted code
#      signing cert (self-signed pfx won't pass winget validation). If you
#      don't have one yet, leave this workflow on workflow_dispatch only
#      and ship the portable ZIP path via the 'zip' installer-type variant
#      below.
#   3. PackageIdentifier 'SauravBhattacharya.WinSentinel' must match the
#      AppxManifest.xml Publisher CN once you switch to the trusted cert.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to submit (e.g. v1.2.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  winget:
    name: Submit manifest
    runs-on: windows-latest
    if: ${{ !github.event.release.prerelease }}

    steps:
    - name: Submit to winget-pkgs
      uses: vedantmgoyal9/winget-releaser@main
      with:
        identifier: SauravBhattacharya.WinSentinel
        # Match the MSIX asset name produced by release.yml, e.g. WinSentinel-v1.2.0.msix
        installers-regex: '^WinSentinel-v[0-9]+\.[0-9]+\.[0-9]+\.msix$'
        release-tag: ${{ inputs.tag || github.event.release.tag_name }}
        token: ${{ secrets.WINGET_TOKEN }}
        fork-user: sauravbhattacharya001
