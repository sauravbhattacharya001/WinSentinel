name: 'WinSentinel Security Audit'
description: 'Run a WinSentinel security audit on a Windows runner. Produces SARIF for GitHub Code Scanning, plus score and findings summary.'
author: 'Saurav Bhattacharya'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  version:
    description: 'WinSentinel CLI version to install (default: latest)'
    required: false
    default: 'latest'
  sarif:
    description: 'Generate SARIF output and upload to GitHub Code Scanning (true/false)'
    required: false
    default: 'true'
  fail-below:
    description: 'Fail the action if the security score is below this threshold (0-100, 0 = never fail)'
    required: false
    default: '0'
  modules:
    description: 'Comma-separated list of modules to run, e.g. firewall,network,defender (empty = all modules)'
    required: false
    default: ''
  profile:
    description: 'Scan profile to apply: home, developer, enterprise, server, or none'
    required: false
    default: 'none'
  output-format:
    description: 'Additional report format to produce as an artifact path: json, csv, markdown, or none'
    required: false
    default: 'none'

outputs:
  score:
    description: 'Security score (0-100)'
    value: ${{ steps.audit.outputs.score }}
  grade:
    description: 'Letter grade (A-F)'
    value: ${{ steps.audit.outputs.grade }}
  findings-count:
    description: 'Total number of findings'
    value: ${{ steps.audit.outputs.findings_count }}
  critical-count:
    description: 'Number of critical findings'
    value: ${{ steps.audit.outputs.critical_count }}
  sarif-file:
    description: 'Path to SARIF output file (empty if sarif=false)'
    value: ${{ steps.audit.outputs.sarif_file }}
  report-file:
    description: 'Path to the additional report output file (empty if output-format=none)'
    value: ${{ steps.audit.outputs.report_file }}

runs:
  using: 'composite'
  steps:
    - name: Install WinSentinel CLI
      shell: pwsh
      run: |
        $version = '${{ inputs.version }}'
        if ($version -eq 'latest' -or [string]::IsNullOrWhiteSpace($version)) {
          dotnet tool install --global WinSentinel.Cli
        } else {
          dotnet tool install --global WinSentinel.Cli --version $version
        }
        # Ensure the global tools dir is on PATH for subsequent steps
        $toolPath = Join-Path $env:USERPROFILE '.dotnet\tools'
        if ($env:PATH -notlike "*$toolPath*") {
          "$toolPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        }
        $env:PATH = "$toolPath;$env:PATH"
        winsentinel --version

    - name: Run Security Audit
      id: audit
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $toolPath = Join-Path $env:USERPROFILE '.dotnet\tools'
        if ($env:PATH -notlike "*$toolPath*") { $env:PATH = "$toolPath;$env:PATH" }

        $jsonFile  = Join-Path $env:RUNNER_TEMP 'winsentinel.json'
        $sarifFile = Join-Path $env:RUNNER_TEMP 'winsentinel.sarif'
        $reportFile = ''

        # Shared filters applied to every export invocation.
        $common = @()
        $modules = '${{ inputs.modules }}'.Trim()
        if ($modules) { $common += @('--modules', $modules) }
        $profile = '${{ inputs.profile }}'.Trim()
        if ($profile -and $profile -ne 'none') { $common += @('--profile', $profile) }

        # 1) JSON export -> machine-readable score/findings (silent, file output).
        #    `export` runs the audit with no console chrome, so the file is clean JSON.
        $jsonArgs = @('export', 'json', '-o', $jsonFile) + $common
        Write-Host "Running: winsentinel $($jsonArgs -join ' ')"
        & winsentinel @jsonArgs
        if (-not (Test-Path $jsonFile)) {
          Write-Error "WinSentinel did not produce a JSON report at $jsonFile"
          exit 1
        }

        # Parse the documented JSON schema: overallScore / grade / summary.{totalFindings,critical}
        $report = Get-Content $jsonFile -Raw | ConvertFrom-Json
        $score = [int]($report.overallScore)
        $grade = if ($report.grade) { [string]$report.grade } else { 'F' }
        $findingsCount = [int]($report.summary.totalFindings)
        $criticalCount = [int]($report.summary.critical)

        # 2) SARIF export -> GitHub Code Scanning (separate invocation; formats are exclusive).
        $genSarif = '${{ inputs.sarif }}'
        if ($genSarif -eq 'true') {
          $sarifArgs = @('export', 'sarif', '-o', $sarifFile) + $common
          Write-Host "Running: winsentinel $($sarifArgs -join ' ')"
          & winsentinel @sarifArgs
          if (-not (Test-Path $sarifFile)) {
            Write-Warning "SARIF export requested but no file was produced at $sarifFile"
            $sarifFile = ''
          }
        } else {
          $sarifFile = ''
        }

        # 3) Optional additional report artifact (json/csv/markdown).
        $format = '${{ inputs.output-format }}'.Trim()
        if ($format -and $format -ne 'none') {
          $reportFile = Join-Path $env:RUNNER_TEMP "winsentinel-report.$format"
          $reportArgs = @('export', $format, '-o', $reportFile) + $common
          Write-Host "Running: winsentinel $($reportArgs -join ' ')"
          & winsentinel @reportArgs
          if (-not (Test-Path $reportFile)) { $reportFile = '' }
        }

        # Publish outputs.
        "score=$score"                   | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "grade=$grade"                   | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "findings_count=$findingsCount"  | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "critical_count=$criticalCount"  | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "sarif_file=$sarifFile"          | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "report_file=$reportFile"        | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

        # Console + job summary.
        Write-Host ""
        Write-Host "==============================================="
        Write-Host "  WinSentinel Score: $score/100 ($grade)"
        Write-Host "  Findings: $findingsCount (Critical: $criticalCount)"
        Write-Host "==============================================="

        $summary = @"
        ## WinSentinel Security Audit

        | Metric | Value |
        |--------|-------|
        | **Score** | $score / 100 |
        | **Grade** | $grade |
        | **Findings** | $findingsCount |
        | **Critical** | $criticalCount |
        "@
        $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

        # Fail-below gate.
        $failBelow = 0
        [int]::TryParse('${{ inputs.fail-below }}', [ref]$failBelow) | Out-Null
        if ($failBelow -gt 0 -and $score -lt $failBelow) {
          Write-Host "::error::Security score $score is below the required threshold of $failBelow"
          exit 1
        }

    - name: Upload SARIF to GitHub Code Scanning
      if: ${{ inputs.sarif == 'true' && steps.audit.outputs.sarif_file != '' }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ steps.audit.outputs.sarif_file }}
        category: winsentinel
      continue-on-error: true
