name: 'WinSentinel Security Audit'
description: 'Run WinSentinel security audit on your Windows CI runner and upload SARIF results to GitHub Code Scanning'
author: 'Saurav Bhattacharya'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  version:
    description: 'WinSentinel CLI version to install (default: latest)'
    required: false
    default: 'latest'
  profile:
    description: 'Audit profile to run (default: all)'
    required: false
    default: 'all'
  fail-on-score-below:
    description: 'Fail the workflow if the security score is below this threshold (0-100, default: 0 = never fail)'
    required: false
    default: '0'
  upload-sarif:
    description: 'Upload SARIF results to GitHub Code Scanning (default: true)'
    required: false
    default: 'true'
  output-format:
    description: 'Output format: sarif, json, csv (default: sarif)'
    required: false
    default: 'sarif'
  additional-args:
    description: 'Additional arguments to pass to winsentinel CLI'
    required: false
    default: ''

outputs:
  score:
    description: 'The security score (0-100)'
    value: ${{ steps.audit.outputs.score }}
  grade:
    description: 'The security grade (A-F)'
    value: ${{ steps.audit.outputs.grade }}
  findings-count:
    description: 'Total number of findings'
    value: ${{ steps.audit.outputs.findings }}
  sarif-file:
    description: 'Path to the SARIF output file'
    value: ${{ steps.audit.outputs.sarif-file }}

runs:
  using: 'composite'
  steps:
    - name: Install WinSentinel CLI
      shell: pwsh
      run: |
        $version = '${{ inputs.version }}'
        if ($version -eq 'latest') {
          dotnet tool install --global WinSentinel.Cli
        } else {
          dotnet tool install --global WinSentinel.Cli --version $version
        }
        # Ensure tool is on PATH
        $toolPath = Join-Path $env:USERPROFILE '.dotnet\tools'
        if ($env:PATH -notlike "*$toolPath*") {
          echo "$toolPath" >> $env:GITHUB_PATH
        }

    - name: Run Security Audit
      id: audit
      shell: pwsh
      run: |
        $outFile = Join-Path $env:RUNNER_TEMP 'winsentinel-results.sarif'
        $jsonFile = Join-Path $env:RUNNER_TEMP 'winsentinel-results.json'
        
        # Run the audit with JSON output to capture score
        $args = @('--audit', '--json', '--output', $jsonFile)
        
        $profile = '${{ inputs.profile }}'
        if ($profile -ne 'all') {
          $args += @('--profile', $profile)
        }
        
        $additionalArgs = '${{ inputs.additional-args }}'
        if ($additionalArgs) {
          $args += $additionalArgs.Split(' ', [StringSplitOptions]::RemoveEmptyEntries)
        }
        
        Write-Host "Running: winsentinel $($args -join ' ')"
        & winsentinel @args
        
        # Parse results
        if (Test-Path $jsonFile) {
          $results = Get-Content $jsonFile -Raw | ConvertFrom-Json
          $score = $results.score ?? $results.Score ?? 0
          $grade = $results.grade ?? $results.Grade ?? 'N/A'
          $findings = ($results.findings ?? $results.Findings ?? @()).Count
        } else {
          # Fallback: run with --score to get just the score
          $scoreOutput = & winsentinel --score --json 2>$null | ConvertFrom-Json
          $score = $scoreOutput.score ?? $scoreOutput.Score ?? 0
          $grade = $scoreOutput.grade ?? $scoreOutput.Grade ?? 'N/A'
          $findings = 0
        }
        
        Write-Host "Security Score: $score/100 (Grade: $grade)"
        Write-Host "Findings: $findings"
        
        echo "score=$score" >> $env:GITHUB_OUTPUT
        echo "grade=$grade" >> $env:GITHUB_OUTPUT  
        echo "findings=$findings" >> $env:GITHUB_OUTPUT
        
        # Generate SARIF output
        $sarifArgs = @('--audit', '--sarif', '--output', $outFile)
        if ($profile -ne 'all') { $sarifArgs += @('--profile', $profile) }
        & winsentinel @sarifArgs
        
        if (Test-Path $outFile) {
          echo "sarif-file=$outFile" >> $env:GITHUB_OUTPUT
        }
        
        # Check score threshold
        $threshold = [int]'${{ inputs.fail-on-score-below }}'
        if ($threshold -gt 0 -and $score -lt $threshold) {
          Write-Host "::error::Security score $score is below threshold $threshold"
          exit 1
        }

    - name: Upload SARIF to GitHub Code Scanning
      if: inputs.upload-sarif == 'true' && steps.audit.outputs.sarif-file != ''
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.audit.outputs.sarif-file }}
        category: winsentinel-security-audit
